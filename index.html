<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수직선 디펜스 & 스나이퍼</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>수직선 디펜스 & 스나이퍼</h1>
            <div class="stats">
                <div class="stat-item">점수: <span id="score">0</span></div>
                <div class="stat-item">체력: <span id="health">❤️❤️❤️</span></div>
            </div>
            <div class="mode-tabs">
                <button id="btn-mode-defense" class="tab-btn active">모드 1: 아케이드 디펜스</button>
                <button id="btn-mode-sniper" class="tab-btn">모드 2: 블라인드 스나이퍼</button>
            </div>
        </header>

        <main>
            <div id="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
                <div id="sniper-alert" class="hidden">
                    적 위치: <span id="target-coord-container"></span>
                </div>
                <div id="global-timer-container" class="hidden">
                    <div id="global-timer-bar"></div>
                </div>

                <div id="overlay">
                    <div id="start-screen">
                        <h2 id="start-title">수직선 디펜스</h2>
                        
                        <div id="difficulty-selector" class="hidden">
                            <p class="instruction">난이도 선택</p>
                            <div class="difficulty-btns">
                                <button id="btn-easy" class="diff-btn">쉬움</button>
                                <button id="btn-normal" class="diff-btn active">보통</button>
                            </div>
                        </div>

                        <div class="mode-select-info">
                            <p id="mode-info-text"><strong>모드 1:</strong> 적의 위치를 숫자로 입력하세요.</p>
                        </div>
                        <button id="start-btn">게임 시작</button>
                    </div>
                    <div id="game-over-screen" class="hidden">
                        <h2>GAME OVER</h2>
                        <p id="game-over-mode-info"></p>
                        <p>최종 점수: <span id="final-score">0</span></p>
                        <button id="restart-btn">다시 시작</button>
                    </div>
                </div>
            </div>
        </main>

            <div id="control-area">
                <div id="defense-controls">
                    <p class="instruction">적의 위치(숫자)를 입력하고 Enter를 누르세요!</p>
                    <input type="text" id="answer-input" placeholder="예: -4.5" autofocus autocomplete="off">
                </div>
                <div id="sniper-controls" class="hidden">
                    <p class="instruction">수직선 위의 해당 좌표를 마우스로 클릭하세요!</p>
                </div>
            </div>
    </div>
    <script type="module" src="/src/script.js"></script>
</body>
</html>
